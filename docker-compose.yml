services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: procureiq
      POSTGRES_PASSWORD: procureiq
      POSTGRES_DB: procureiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procureiq -d procureiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://procureiq:procureiq@db:5432/procureiq
      API_KEY: ${API_KEY:-procureiq-dev-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --browser.gatherUsageStats false
    environment:
      API_BASE_URL: http://api:8000
      API_KEY: ${API_KEY:-procureiq-dev-key}
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  pgdata:
